<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="./courses.html">
        <h1>Student Registration Form</h1>
        Enter Student Name
        <input type="text" placeholder="Name">
        <br><br>
        Enter Your Email
        <input type="text" placeholder="Email">
        <br><br>
        Enter Password
        <input type="password" placeholder="password">
        <br>
        <h3>Select Your Class</h3>
        <label for="101">
            <input type="radio" value="Class XI" name="Class" id="101">Class XI
        </label>
        <br />
        <label for="102">
            <input type="radio" value="Class XII" name="Class" id="102">Class XII
        </label>
        <br>
        <h3>Select Your Subjects</h3>
        <label>
            <input type="checkbox" value="cs" name="Subjects">Computer Science
        </label>
        <br>
        <label>
            <input type="checkbox" value="bio" name="Subjects">Biology
        </label>
        <br>
        <label>
            <input type="checkbox" value="phy" name="Subjects">Physics
        </label>
        <br>
        <label>
            <input type="checkbox" value="chem" name="Subjects">Chemistry
        </label>
        <br>
        <label>
            <input type="checkbox" value="urdu" name="Subjects">Urdu
        </label>
        <br>
        <label>
            <input type="checkbox" value="eng" name="Subjects">English
        </label>
        <br>
        <label>
            <input type="checkbox" value="math" name="Subjects">Math
        </label>
        <br>
        <label>
            <input type="checkbox" value="isl" name="Subjects">Islamiyat
        </label>
        <br>
        <label>
            <input type="checkbox" value="pakstudy" name="Subjects">Pakistan Study
        </label>
        <br>
        <h3>Select Your City</h3>
        City
        <select >
            <option value="lahore">Lahore</option>
            <option value="sheikhupura">Sheikhupure</option>
            <option value="karachi">Karachi</option>
            <option value="gujrawala">Gujrawala</option>
            <option value="multan">Multan</option>
            <option value="surgodha">Surgodha</option>
            <option value="murree">MUrree</option>
            <option value="peshawar">Peshawar</option>
        </select>
        <br>
        <br>
        Submit
        <input type="submit" value="submit">
    </form>
</body>
</html>
